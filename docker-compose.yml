version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: leadflow-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: leadflow_crm
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 30s
      timeout: 10s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: leadflow-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/leadflow_crm
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-secure-random-string-in-production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change-this-refresh-secret-in-production}
      - JWT_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:5173
      - LOG_LEVEL=info
    depends_on:
      mongodb:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: leadflow-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    environment:
      - VITE_API_URL=/api/v1

volumes:
  mongodb_data: